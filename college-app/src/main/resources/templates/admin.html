<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2>Admin Panel</h2>

    <h4>Users</h4>
    <table class="table table-bordered">
        <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Role</th>
        </tr>

        <tr th:each="u : ${users}">
            <td th:text="${u.id}"></td>
            <td th:text="${u.username}"></td>
            <td th:text="${u.role}"></td>
        </tr>
    </table>

    <h4 class="mt-5">Attendance</h4>
    <table class="table table-bordered">
        <tr>
            <th>User</th>
            <th>Date</th>
            <th>Status</th>
        </tr>

        <tr th:each="a : ${attendance}">
            <td th:text="${a.user.username}"></td>
            <td th:text="${a.date}"></td>
            <td th:text="${a.status}"></td>
        </tr>
    </table>

</div>

</body>
</html>
