<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* 🔥 DARK TECH BACKGROUND */
        body {
            margin: 0;
            min-height: 100vh;
            color: white;
            font-family: Arial, sans-serif;

            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            background-attachment: fixed;
        }

        /* subtle glowing overlay */
        body::before {
            content: "";
            position: fixed;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 20%, rgba(0,255,255,0.1), transparent),
                        radial-gradient(circle at 80% 80%, rgba(255,0,255,0.1), transparent);
            z-index: -1;
        }

        /* HEADER */
        h2 {
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            font-weight: bold;
        }

        /* SUBJECT CARDS */
        .subject-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .subject-card:hover {
            transform: translateY(-5px) scale(1.03);
            box-shadow: 0 0 25px rgba(0,0,0,0.6);
        }

        /* INPUTS */
        .form-control {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
        }

        .form-control::placeholder {
            color: rgba(255,255,255,0.6);
        }

        /* BUTTON HOVER */
        button:hover {
            transform: scale(1.05);
            transition: 0.2s;
        }
        .welcome-text {
    		position: absolute;
   			top: 20px;
   			left: 30px;
    		font-size: 20px;
    		font-weight: bold;
    		letter-spacing: 1px;
    		color: white;
    		text-shadow: 0 0 10px rgba(255,255,255,0.6);
		}
		.menu-btn {
    		position: fixed;
    		top: 20px;
    		left: 20px;
    		font-size: 28px;
    		cursor: pointer;
    		z-index: 1000;
		}

		/* Sidebar */
		.sidebar {
    		position: fixed;
    		left: -250px;
    		top: 0;
   			width: 250px;
    		height: 100%;
    		background: #111;
    		padding-top: 60px;
    		transition: 0.3s;
    		z-index: 999;
			}

		.sidebar a {
   			display: block;
    		padding: 15px;
    		color: white;
    		text-decoration: none;
			}

		.sidebar a:hover {
    		background: cyan;
    		color: black;
		}

    </style>
</head>

<body>

<!-- ☰ MENU BUTTON -->
<div class="menu-btn" onclick="toggleMenu()">☰</div>
<div th:replace="fragments/navbar :: body"></div>

<div class="container mt-5">

    <h2 class="mb-4 text-center">Your Subjects</h2>

    <!-- ADD SUBJECT -->
    <form action="/add-subject" method="post" class="row g-2 mb-4">

    <div class="col">
        <input class="form-control" type="text" name="name" placeholder="Subject Name" required>
    </div>

    <div class="col">
        <input class="form-control" type="number" name="totalClasses" placeholder="Total Classes So Far" required>
    </div>

    <div class="col">
        <input class="form-control" type="number" name="attendedClasses" placeholder="Attended So Far" required>
    </div>

    <div class="col">
        <button class="btn btn-primary w-100">Add</button>
    </div>

</form>

    <!-- SUBJECT CARDS -->
    <div class="row">

        <div class="col-md-4" th:each="sub : ${subjects}">
            <div class="card subject-card text-white mb-4 p-3">

                <h4 class="mb-3" th:text="${sub.name}"></h4>

                <p>Total Classes: <b th:text="${sub.totalClasses}"></b></p>
                <p>Attended: <b th:text="${sub.attendedClasses}"></b></p>

                <!-- SAFE % -->
                <p th:text="${sub.totalClasses > 0 ? (sub.attendedClasses * 100) / sub.totalClasses + '%' : '0%'}"
                   th:style="${sub.totalClasses > 0 && (sub.attendedClasses * 100) / sub.totalClasses < 75} ? 'color:red;' : 'color:lightgreen;'">
                </p>

                <!-- WARNING -->
                <p th:if="${sub.totalClasses > 0 && (sub.attendedClasses * 100) / sub.totalClasses < 75}"
                   style="color:red;">
                   ⚠ Low Attendance
                </p>

                <!-- ACTION BUTTONS -->
                <div class="d-flex justify-content-between align-items-center">

                    <!-- MARK -->
                    <form action="/mark" method="post" class="d-flex gap-2">
                        <input type="hidden" name="subjectId" th:value="${sub.id}">
                        <button class="btn btn-success btn-sm" name="status" value="Present">P</button>
                        <button class="btn btn-danger btn-sm" name="status" value="Absent">A</button>
                    </form>

                    <!-- DELETE -->
                    <form action="/delete-subject" method="post">
                        <input type="hidden" name="subjectId" th:value="${sub.id}">
                        <button class="btn btn-danger btn-sm"
                                onclick="return confirm('Delete this subject?')">
                            🗑
                        </button>
                    </form>

                </div>

            </div>
        </div>

    </div>

</div>

</body>
<script>
function toggleMenu() {
    let sidebar = document.getElementById("sidebar");

    if (sidebar.style.left === "0px") {
        sidebar.style.left = "-250px";
    } else {
        sidebar.style.left = "0px";
    }
}
</script>
</html>
