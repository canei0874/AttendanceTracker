<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Leaderboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div th:replace="fragments/navbar :: body"></div>

<div class="container mt-5">

    <h2>🏆 Leaderboard</h2>

    <!-- 🔥 DEBUG TEXT -->
    <p th:if="${#lists.isEmpty(leaderboard)}">No data available</p>

    <table class="table table-dark mt-4" th:if="${!#lists.isEmpty(leaderboard)}">
        <tr>
            <th>Rank</th>
            <th>Username</th>
            <th>Score</th>
        </tr>

        <tr th:each="user, stat : ${leaderboard}">
            <td th:text="${stat.index + 1}"></td>
            <td th:text="${user.username}"></td>
            <td th:text="${#numbers.formatDecimal(user.score,1,2)}"></td>
        </tr>
    </table>

</div>

</body>
</html>
