<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!-- MENU BUTTON -->
<div class="menu-btn" onclick="toggleMenu()">☰</div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
    <a href="/tracker">📊 Tracker Score</a>
    <a href="/dashboard">📅 Attendance</a>
    <a href="/marks">📝 Marks</a>
    <a href="/leaderboard">🏆 Leaderboard</a>
    <a href="/logout">🚪 Logout</a>
</div>

<style>
.menu-btn {
    position: fixed;
    top: 20px;
    left: 20px;
    font-size: 28px;
    cursor: pointer;
    z-index: 1000;
}

.sidebar {
    position: fixed;
    left: -250px;
    top: 0;
    width: 250px;
    height: 100%;
    background: #111;
    padding-top: 60px;
    transition: 0.3s;
    z-index: 999;
}

.sidebar a {
    display: block;
    padding: 15px;
    color: white;
    text-decoration: none;
}

.sidebar a:hover {
    background: cyan;
    color: black;
}
</style>

<script>
function toggleMenu() {
    let sidebar = document.getElementById("sidebar");

    if (sidebar.style.left === "0px") {
        sidebar.style.left = "-250px";
    } else {
        sidebar.style.left = "0px";
    }
}
</script>

</body>
</html>
