<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Particle background -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

    <style>
        /* Background */
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: #0f2027;
        }

        /* Center content */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        /* Glass login box */
        .login-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            padding: 30px;
            border-radius: 15px;
            width: 320px;
            text-align: center;
            color: white;
            box-shadow: 0 0 25px rgba(255,255,255,0.2);
        }

        input {
            margin-bottom: 15px;
        }

        button {
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        a {
            color: lightblue;
        }

        /* 🔥 Admin mode button */
       /* admin-mode {
            background-color: crimson !important;
            border: none;
        }

        /* Small hint */
        .hint {
            font-size: 12px;
            opacity: 0.7;
        }
        .alert-danger {
    background: rgba(255,0,0,0.2);
    border: none;
    color: white;
}
    </style>
</head>

<body>


<!-- Particle background -->
<div id="particles-js"></div>

<!-- Login Card -->
<div class="login-box">
    <h2 class="mb-3">Login</h2>
    <div th:if="${param.error}" class="alert alert-danger">
    Invalid username or password
	</div>

    <form method="post" action="/login">

        <input class="form-control" type="text" name="username" placeholder="Username" required>
        <input class="form-control" type="password" name="password" placeholder="Password" required>

        <!-- 🔥 ADMIN TOGGLE
        <div class="form-check text-start mt-2 mb-2">
            <input class="form-check-input" type="checkbox" id="adminCheck">
            <label class="form-check-label" for="adminCheck">
                Login as Admin
            </label>
        </div> -->

        <!-- 🔥 BUTTON -->
        <button id="loginBtn" class="btn btn-primary w-100 mt-2">
            Login as User
        </button>

    </form>

     <!--<p class="hint mt-2">
        Admin users will be redirected automatically
    </p> -->

    <p class="mt-3">
        Don't have an account? <a href="/register">Register</a>
    </p>
</div>

<!-- Particle config -->
<script>
particlesJS("particles-js", {
  particles: {
    number: { value: 80 },
    size: { value: 3 },
    move: { speed: 2 },
    line_linked: { enable: true },
    opacity: { value: 0.5 }
  }
});
</script>

<!-- 🔥 ADMIN TOGGLE SCRIPT -->
<script>
const adminCheck = document.getElementById("adminCheck");
const loginBtn = document.getElementById("loginBtn");

adminCheck.addEventListener("change", function() {
    if (this.checked) {
        loginBtn.textContent = "Login as Admin";
        loginBtn.classList.remove("btn-primary");
        loginBtn.classList.add("admin-mode");
    } else {
        loginBtn.textContent = "Login as User";
        loginBtn.classList.remove("admin-mode");
        loginBtn.classList.add("btn-primary");
    }
});
</script>

</body>
</html>
